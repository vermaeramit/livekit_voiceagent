# Self-hosted LiveKit server config (single-node, dev/self-host).
# Docs: https://docs.livekit.io/home/self-hosting/deployment/

port: 7880            # signaling / WebSocket
rtc:
  tcp_port: 7881      # ICE over TCP fallback
  udp_port: 7882      # single-port UDP mux (simplest to expose via Docker)
  use_external_ip: false
  # Advertise loopback so ICE candidates are reachable by BOTH the browser
  # (on the host) and the agent (on the host network — see docker-compose.yml).
  # Loopback is universal: not machine/network specific, and never firewalled.
  node_ip: 127.0.0.1

# api_key: api_secret  — MUST match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in compose.
# Replace this dev secret before exposing the server anywhere public.
keys:
  devkey: devsecret_change_me_min_32_characters_long_0123456789

logging:
  level: info
