# Server (Linux) deployment — isolated bridge network, only chosen ports exposed.
# Does NOT use host networking, so it won't interfere with other apps on the host.
# Run with:  docker compose -f docker-compose.server.yml --env-file .env up -d --build
#
# All tunable values come from .env (see .env.server.example):
#   SERVER_IP, LIVEKIT_API_KEY, LIVEKIT_API_SECRET, SARVAM_API_KEY,
#   WEB_PORT, LK_SIGNAL_PORT, LK_TCP_PORT, LK_UDP_PORT

services:
  livekit:
    image: livekit/livekit-server:latest
    # --node-ip makes the server advertise the host's reachable IP so remote
    # browsers (and the agent) can connect for media.
    command: --config /etc/livekit.yaml --node-ip ${SERVER_IP}
    restart: unless-stopped
    ports:
      - "${LK_SIGNAL_PORT:-7880}:7880"
      - "${LK_TCP_PORT:-7881}:7881"
      - "${LK_UDP_PORT:-7882}:7882/udp"
    environment:
      # Keys via env (format "key: secret"); must match the agent + token below.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.server.yaml:/etc/livekit.yaml

  agent:
    build: .
    restart: unless-stopped
    depends_on:
      - livekit
    # Default bridge network: reaches the server internally by service name.
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      SARVAM_API_KEY: ${SARVAM_API_KEY}

  token:
    build: .
    command: ["python", "token_server.py"]
    restart: unless-stopped
    depends_on:
      - livekit
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # URL the browser uses to reach LiveKit — the server's IP + signal port.
      LIVEKIT_PUBLIC_URL: ws://${SERVER_IP}:${LK_SIGNAL_PORT:-7880}
    volumes:
      - ./token_server.py:/app/token_server.py
      - ./web:/app/web
